<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 | 월드컵 베팅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#0a1a0f; --surface:#122a18; --surface2:#1a3a22; --border:rgba(255,255,255,0.1); --text:#f0f0f0; --muted:#8ab895; --green:#2d9e4a; --gold:#f0b429; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height: 100vh; }
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .login-box { background: var(--surface); border: 1px solid rgba(45,158,74,0.3); border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; text-align: center; }
  .login-box h2 { margin-bottom: 8px; font-size: 1.2rem; }
  .login-box p { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.5rem; }
  .login-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px 16px; font-size: 1rem; margin-bottom: 1rem; text-align: center; letter-spacing: 4px; outline: none; }
  .login-box input:focus { border-color: var(--green); }
  .btn-login { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
  .login-error { color: #ff8080; font-size: 0.8rem; margin-top: 8px; }
  #adminScreen { display: none; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1rem; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; }
  .admin-content { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  .section-title { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
  .stat-card .val { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .bet-section { margin-bottom: 2rem; }
  .bet-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .bet-info { flex: 1; min-width: 160px; }
  .bet-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
  .bet-score { font-size: 0.8rem; color: var(--muted); }
  .bet-score .eng { color: #ff9090; }
  .bet-score .arg { color: #74ACDF; }
  .bet-status { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .status-pending { background: rgba(240,180,41,0.2); color: #f0c060; border: 1px solid rgba(240,180,41,0.35); }
  .status-approved { background: rgba(45,158,74,0.2); color: #70e090; border: 1px solid rgba(45,158,74,0.35); }
  .bet-actions { display: flex; gap: 6px; }
  .btn-approve { background: rgba(45,158,74,0.2); border: 1px solid rgba(45,158,74,0.5); color: #70e090; padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .btn-approve:hover { background: rgba(45,158,74,0.4); }
  .btn-reject { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff8080; padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .btn-reject:hover { background: rgba(231,76,60,0.3); }
  .btn-revoke { background: rgba(240,180,41,0.15); border: 1px solid rgba(240,180,41,0.4); color: #f0c060; padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .empty-state { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 2rem; background: var(--surface); border: 1px dashed var(--border); border-radius: 10px; }
  .mini-grid { overflow-x: auto; margin-bottom: 2rem; }
  table { border-collapse: collapse; width: 100%; min-width: 480px; font-size: 0.78rem; }
  th { background: var(--surface2); padding: 8px; text-align: center; border: 1px solid var(--border); color: var(--muted); font-size: 0.72rem; }
  td { border: 1px solid var(--border); padding: 8px; text-align: center; vertical-align: middle; }
  td .approved-name { color: #70e090; display: block; font-weight: 600; }
  td .pending-name { color: #f0c060; display: block; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--green); color: #80e0a0; padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; z-index: 200; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:12px;">🔐</div>
    <h2>관리자 로그인</h2>
    <p>월드컵 베팅 관리자 페이지입니다</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn-login" onclick="login()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="adminScreen">
  <header>
    <h1>⚽ 월드컵 베팅 관리자 | 잉글랜드 vs 아르헨티나</h1>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </header>
  <div class="admin-content">
    <div class="section-title">현황</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="val" id="adm-total">-</div><div class="lbl">전체 신청</div></div>
      <div class="stat-card"><div class="val" id="adm-pending">-</div><div class="lbl">대기 중</div></div>
      <div class="stat-card"><div class="val" id="adm-approved">-</div><div class="lbl">승인 완료</div></div>
      <div class="stat-card"><div class="val" id="adm-pool">-</div><div class="lbl">총 상금 풀</div></div>
    </div>
    <div class="bet-section">
      <div class="section-title">⏳ 승인 대기 중</div>
      <div id="pendingList"></div>
    </div>
    <div class="bet-section">
      <div class="section-title">✅ 승인 완료</div>
      <div id="approvedList"></div>
    </div>
    <div class="section-title">📊 전체 그리드 현황</div>
    <div class="mini-grid"><table id="adminGrid"></table></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var ADMIN_PASSWORD = '1234';
var SUPABASE_URL = 'https://uknywyszkffaeddnusjx.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrbnl3eXN6a2ZmYWVkZG51c2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njk1ODMsImV4cCI6MjA5NzI0NTU4M30.HGqPSLeKq6azZ7RM_nfbkJgeslOCcS0ICvFrlPGjq44';
var BET_AMOUNT = 50000;
var ROLLOVER = 1100000;

var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var allBets = [];

function login() {
  var pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadAndRender();
  } else {
    document.getElementById('loginError').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('pwInput').value = '';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

async function loadAndRender() {
  try {
    var result = await supabaseClient.from('bets').select('*').order('created_at', { ascending: true });
    if (result.error) throw result.error;
    allBets = result.data;
    renderAdmin();
  } catch(e) {
    console.error(e);
  }
}

function renderAdmin() {
  var pending = allBets.filter(function(b) { return b.status === 'pending'; });
  var approved = allBets.filter(function(b) { return b.status === 'approved'; });
  var totalPool = (approved.length * BET_AMOUNT) + ROLLOVER;

  document.getElementById('adm-total').textContent = allBets.length + '명';
  document.getElementById('adm-pending').textContent = pending.length + '명';
  document.getElementById('adm-approved').textContent = approved.length + '명';
  document.getElementById('adm-pool').textContent = totalPool.toLocaleString() + '원';

  var pendingEl = document.getElementById('pendingList');
  if (pending.length === 0) {
    pendingEl.innerHTML = '<div class="empty-state">대기 중인 신청이 없습니다</div>';
  } else {
    pendingEl.innerHTML = pending.map(function(b) {
      var parts = b.cell_key.split('-');
      var eng = parts[0];
      var arg = parts[1];
      return '<div class="bet-item">' +
        '<div class="bet-info">' +
          '<div class="bet-name">' + b.name + '</div>' +
          '<div class="bet-score"><span class="eng">🏴 잉글랜드 ' + eng + '골</span> vs <span class="arg">' + arg + '골 아르헨티나 🇦🇷</span></div>' +
        '</div>' +
        '<span class="bet-status status-pending">대기 중</span>' +
        '<div class="bet-actions">' +
          '<button class="btn-approve" onclick="approveBet(\'' + b.id + '\')">✓ 승인</button>' +
          '<button class="btn-reject" onclick="rejectBet(\'' + b.id + '\',\'' + b.name + '\')">✗ 거절</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  var approvedEl = document.getElementById('approvedList');
  if (approved.length === 0) {
    approvedEl.innerHTML = '<div class="empty-state">승인된 참가자가 없습니다</div>';
  } else {
    approvedEl.innerHTML = approved.map(function(b) {
      var parts = b.cell_key.split('-');
      var eng = parts[0];
      var arg = parts[1];
      return '<div class="bet-item">' +
        '<div class="bet-info">' +
          '<div class="bet-name">' + b.name + '</div>' +
          '<div class="bet-score"><span class="eng">🏴 잉글랜드 ' + eng + '골</span> vs <span class="arg">' + arg + '골 아르헨티나 🇦🇷</span></div>' +
        '</div>' +
        '<span class="bet-status status-approved">승인 완료</span>' +
        '<div class="bet-actions">' +
          '<button class="btn-revoke" onclick="revokeBet(\'' + b.id + '\',\'' + b.name + '\')">취소</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  renderGrid();
}

function renderGrid() {
  var table = document.getElementById('adminGrid');
  var html = '<thead><tr><th>아르/잉</th>';
  for (var k = 0; k <= 5; k++) html += '<th>잉글랜드 ' + k + '골</th>';
  html += '</tr></thead><tbody>';
  for (var a = 0; a <= 5; a++) {
    html += '<tr><th>아르헨티나 ' + a + '골</th>';
    for (var e = 0; e <= 5; e++) {
      var key = e + '-' + a;
      var list = allBets.filter(function(b) { return b.cell_key === key; });
      html += '<td>';
      list.filter(function(b) { return b.status === 'approved'; }).forEach(function(b) { html += '<span class="approved-name">✅ ' + b.name + '</span>'; });
      list.filter(function(b) { return b.status === 'pending'; }).forEach(function(b) { html += '<span class="pending-name">⏳ ' + b.name + '</span>'; });
      if (list.length === 0) html += '<span style="color:#555">-</span>';
      html += '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

async function approveBet(id) {
  try {
    var result = await supabaseClient.from('bets').update({ status: 'approved' }).eq('id', id);
    if (result.error) throw result.error;
    await loadAndRender();
    showToast('✅ 승인 완료');
  } catch(e) { showToast('오류 발생'); }
}

async function rejectBet(id, name) {
  if (!confirm(name + '님의 신청을 거절하시겠습니까?')) return;
  try {
    var result = await supabaseClient.from('bets').delete().eq('id', id);
    if (result.error) throw result.error;
    await loadAndRender();
    showToast(name + '님 신청 거절됨');
  } catch(e) { showToast('오류 발생'); }
}

async function revokeBet(id, name) {
  if (!confirm(name + '님의 승인을 취소하시겠습니까?')) return;
  try {
    var result = await supabaseClient.from('bets').update({ status: 'pending' }).eq('id', id);
    if (result.error) throw result.error;
    await loadAndRender();
    showToast(name + '님 승인 취소됨');
  } catch(e) { showToast('오류 발생'); }
}

supabaseClient.channel('admin-channel')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'bets' }, function() {
    loadAndRender();
  })
  .subscribe();

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
